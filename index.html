<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GREEN-API Test</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <main class="page">
    <header class="page-header">
      <h1 class="page-title">GREEN-API-TEST</h1>
      <p class="page-subtitle">Тестовое задание на должность “DevOps-Инженер”</p>
    </header>

    <section class="controls" aria-label="Команды GREEN-API">
      <input id="idInstance" type="text" placeholder="idInstance" autocomplete="off" required>
      <input id="apiTokenInstance" type="password" placeholder="ApiTokenInstance" autocomplete="off" required>

      <div class="chat-id-field">
        <input id="chatId" type="tel" placeholder="77771234567" autocomplete="off" required>
        <span>@c.us</span>
      </div>

      <button id="getSettingsButton" type="button">getSettings</button>
      <button id="getStateInstanceButton" type="button">getStateInstance</button>

      <textarea id="messageText" placeholder="Hello World!" required></textarea>
      <button id="sendMessageButton" type="button">sendMessage</button>

      <input id="fileUrl" type="url" placeholder="https://my.site.com/img/horse.png" autocomplete="off" required>
      <input id="fileName" type="text" placeholder="horse.png" autocomplete="off" required>
      <textarea id="fileCaption" placeholder="Описание файла"></textarea>
      <button id="sendFileByUrlButton" type="button">sendFileByUrl</button>
    </section>

    <section class="response" aria-labelledby="responseLabel">
      <label class="response-label" id="responseLabel" for="responseOutput">Ответ:</label>
      <textarea id="responseOutput" class="response-output" readonly
        placeholder="> Здесь появится ответ GREEN-API"></textarea>
    </section>
  </main>

  <script>
    const API_URL = 'https://7107.api.greenapi.com';
    const idInstanceInput = document.querySelector('#idInstance');
    const apiTokenInstanceInput = document.querySelector('#apiTokenInstance');
    const chatIdInput = document.querySelector('#chatId');
    const messageTextInput = document.querySelector('#messageText');
    const fileUrlInput = document.querySelector('#fileUrl');
    const fileNameInput = document.querySelector('#fileName');
    const fileCaptionInput = document.querySelector('#fileCaption');
    const responseOutput = document.querySelector('#responseOutput');
    const buttons = document.querySelectorAll('button');
    function printResponse(value) {
      if (typeof value === 'string') {
        responseOutput.value = `> ${value}`;
        return;
      }
      responseOutput.value = JSON.stringify(value, null, 4);
    }
    function getCredentials() {
      if (!idInstanceInput.reportValidity() || !apiTokenInstanceInput.reportValidity()) {
        return null;
      }
      return {
        idInstance: idInstanceInput.value.trim(),
        apiTokenInstance: apiTokenInstanceInput.value.trim()
      };
    }
    function buildUrl(methodName) {
      const credentials = getCredentials();
      if (!credentials) {
        return null;
      }
      return `${API_URL}/waInstance${credentials.idInstance}/${methodName}/${credentials.apiTokenInstance}`;
    }
    function setLoading(isLoading) {
      buttons.forEach((button) => {
        button.disabled = isLoading;
      });
    }
    async function requestGreenApi(methodName, options = {}, successOutput = null) {
      const url = buildUrl(methodName);
      if (!url) {
        return;
      }
      setLoading(true);
      printResponse('Выполняется запрос...');
      try {
        const response = await fetch(url, options);
        const text = await response.text();
        if (!text) {
          printResponse('Пустой ответ');
          return;
        }
        let apiResponse = text;
        try {
          apiResponse = JSON.parse(text);
        } catch (error) {
          apiResponse = text;
        }
        if (successOutput && response.ok) {
          printResponse(successOutput);
          return;
        }
        printResponse(apiResponse);
      } catch (error) {
        printResponse({
          error: 'Не удалось выполнить запрос',
          message: error.message
        });
      } finally {
        setLoading(false);
      }
    }
    function getChatId(input) {
      return input.value.trim().replace(/@c\.us$/i, '') + '@c.us';
    }
    function getFileNameFromUrl(url) {
      try {
        const pathname = new URL(url).pathname;
        const fileName = pathname.split('/').filter(Boolean).pop();
        return fileName || 'file';
      } catch (error) {
        return 'file';
      }
    }
    function sendJson(methodName, body, successOutput = null) {
      requestGreenApi(methodName, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(body)
      }, successOutput);
    }
    document.querySelector('#getSettingsButton').addEventListener('click', () => {
      requestGreenApi('getSettings', {
        method: 'GET'
      });
    });
    document.querySelector('#getStateInstanceButton').addEventListener('click', () => {
      requestGreenApi('getStateInstance', {
        method: 'GET'
      });
    });
    document.querySelector('#sendMessageButton').addEventListener('click', () => {
      if (!chatIdInput.reportValidity() || !messageTextInput.reportValidity()) {
        return;
      }
      const messagePayload = {
        chatId: getChatId(chatIdInput),
        message: messageTextInput.value.trim()
      };
      sendJson('sendMessage', messagePayload, messagePayload);
    });
    fileUrlInput.addEventListener('change', () => {
      if (!fileNameInput.value.trim()) {
        fileNameInput.value = getFileNameFromUrl(fileUrlInput.value.trim());
      }
    });
    document.querySelector('#sendFileByUrlButton').addEventListener('click', () => {
      if (!chatIdInput.reportValidity() || !fileUrlInput.reportValidity() || !fileNameInput.reportValidity()) {
        return;
      }
      const urlFile = fileUrlInput.value.trim();
      const filePayload = {
        chatId: getChatId(chatIdInput),
        urlFile,
        fileName: fileNameInput.value.trim()
      };
      if (fileCaptionInput.value.trim()) {
        filePayload.caption = fileCaptionInput.value.trim();
      }
      sendJson('sendFileByUrl', filePayload);
    });
  </script>
</body>

</html>
